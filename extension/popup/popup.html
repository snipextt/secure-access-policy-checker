<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Access Policy Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      /* ==================================================================== */
      /* Design tokens                                                        */
      /* ==================================================================== */
      :root {
        --hbr-font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

        --hbr-radius-sm: 6px;
        --hbr-radius-md: 8px;
        --hbr-radius-lg: 12px;
        --hbr-radius-pill: 9999px;
        --hbr-border-width: 2px;

        --hbr-space-xs: 4px;
        --hbr-space-sm: 8px;
        --hbr-space-md: 14px;
        --hbr-space-lg: 18px;

        --hbr-color-bg-page: #f0f2f5;
        --hbr-color-bg-card: rgba(255, 255, 255, 0.72);
        --hbr-color-bg-subtle: rgba(243, 244, 246, 0.6);
        --hbr-color-text-body: #374151;
        --hbr-color-text-heading: #111827;
        --hbr-color-text-weak: #6b7280;
        --hbr-color-border: rgba(0, 0, 0, 0.07);

        --hbr-color-accent: #2563eb;
        --hbr-color-accent-hover: #1d4ed8;
        --hbr-color-accent-light: #eff6ff;
        --hbr-color-header: #1e40af;

        --glass-blur: blur(20px);
        --glass-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.08);
        --glass-shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--hbr-font-family);
        font-weight: 400;
        background:
          radial-gradient(500px 360px at 0% 0%, rgba(37, 99, 235, 0.07), transparent 60%),
          radial-gradient(460px 340px at 100% 20%, rgba(37, 99, 235, 0.05), transparent 55%),
          radial-gradient(520px 400px at 40% 110%, rgba(37, 99, 235, 0.04), transparent 55%),
          var(--hbr-color-bg-page);
        width: 660px;
        color: var(--hbr-color-text-body);
        font-size: 13px;
        min-height: 300px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body.sec-embedded {
        background: transparent;
      }

      /* ------------------------------------------------------------------ */
      /* Header bar                                                          */
      /* ------------------------------------------------------------------ */
      .toolbar {
        background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
        display: flex;
        align-items: center;
        padding: 0 16px;
        height: 46px;
        gap: 10px;
        box-shadow: 0 1px 4px rgba(30, 64, 175, 0.2);
      }
      .toolbar-logo {
        font-size: 18px;
        line-height: 1;
      }
      .toolbar-title {
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.01em;
        flex: 1;
      }

      /* ------------------------------------------------------------------ */
      /* Error Banner                                                        */
      /* ------------------------------------------------------------------ */
      #error-banner {
        display: none;
        background: #fef2f2;
        color: #991b1b;
        padding: 10px 16px;
        font-size: 12px;
        border-bottom: 1px solid #fecaca;
        align-items: center;
        gap: 10px;
      }
      #psc-retry-btn {
        background: var(--hbr-color-accent);
        color: #fff;
        border: none;
        border-radius: var(--hbr-radius-md);
        padding: 4px 14px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      #psc-retry-btn:hover { background: var(--hbr-color-accent-hover); }

      /* ------------------------------------------------------------------ */
      /* Tabs                                                                */
      /* ------------------------------------------------------------------ */
      .tabs {
        display: flex;
        background: var(--hbr-color-bg-card);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border-bottom: 1px solid var(--hbr-color-border);
        padding: 0 16px;
        gap: 2px;
      }
      .tab-btn {
        background: none;
        border: none;
        padding: 13px 18px;
        font-size: 13px;
        font-weight: 600;
        color: var(--hbr-color-text-weak);
        cursor: pointer;
        border-bottom: 2.5px solid transparent;
        transition: color 0.2s, border-color 0.2s;
        font-family: inherit;
        position: relative;
      }
      .tab-btn:hover {
        color: var(--hbr-color-text-heading);
      }
      .tab-btn.active {
        color: var(--hbr-color-accent);
        border-bottom-color: var(--hbr-color-accent);
      }

      /* ------------------------------------------------------------------ */
      /* Tab Contents                                                        */
      /* ------------------------------------------------------------------ */
      .tab-content {
        display: none;
        flex-direction: column;
      }
      .tab-content.active {
        display: flex;
      }

      /* ------------------------------------------------------------------ */
      /* Skeleton loading                                                    */
      /* ------------------------------------------------------------------ */
      @keyframes psc-skeleton-shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .psc-skeleton {
        padding: 20px;
      }
      .psc-skeleton-line,
      .psc-skeleton-block {
        background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 37%, #e5e7eb 63%);
        background-size: 800px 100%;
        animation: psc-skeleton-shimmer 1.6s ease-in-out infinite;
        border-radius: var(--hbr-radius-md);
      }
      .psc-skeleton-line { height: 10px; margin-bottom: 12px; }
      .psc-skeleton-line.psc-skeleton-title { height: 14px; width: 40%; margin-bottom: 16px; }
      .psc-skeleton-line.medium { width: 65%; }
      .psc-skeleton-line.long { width: 88%; }
      .psc-skeleton-row { display: flex; gap: 14px; margin-top: 18px; }
      .psc-skeleton-block { flex: 1 1 0; min-width: 0; height: 140px; }
    </style>
  </head>
  <body>

    <!-- Top toolbar -->
    <div class="toolbar">
      <span class="toolbar-logo">🛡️</span>
      <span class="toolbar-title">Secure Access — Policy Checker</span>
    </div>

    <!-- Error Banner -->
    <div id="error-banner"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-target="tab-tester">Test Policy</button>
      <button class="tab-btn" data-target="tab-rules">Rules</button>
    </div>

    <!-- Tab Contents -->
    <div id="tab-tester" class="tab-content active">
      <div id="tester-root"></div>
    </div>

    <div id="tab-rules" class="tab-content">
      <div id="rules-root"></div>
    </div>

    <!-- Script load order matters -->
    <script src="mock-api.js"></script>
    <script src="matcher.js"></script>
    <script src="popup-sections.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
