<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Access Policy Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <style>
      /* ==================================================================== */
      /* Futuristic Design Tokens                                             */
      /* ==================================================================== */
      :root {
        --hbr-font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --hbr-font-mono: "JetBrains Mono", monospace;

        --hbr-radius-sm: 2px;
        --hbr-radius-md: 2px;
        --hbr-radius-lg: 2px;
        --hbr-radius-pill: 2px;
        --hbr-border-width: 1px;

        --hbr-space-xs: 4px;
        --hbr-space-sm: 8px;
        --hbr-space-md: 12px;
        --hbr-space-lg: 16px;

        --hbr-color-bg-page: #070a12;
        --hbr-color-bg-card: rgba(15, 23, 42, 0.92);
        --hbr-color-bg-subtle: rgba(30, 41, 59, 0.5);
        --hbr-color-text-body: #cbd5e1;
        --hbr-color-text-heading: #f8fafc;
        --hbr-color-text-weak: #64748b;
        --hbr-color-border: #1e293b;

        --hbr-color-accent: #06b6d4;
        --hbr-color-accent-hover: #0891b2;
        --hbr-color-accent-light: rgba(6, 182, 212, 0.12);
        --hbr-color-header: #0f172a;

        --glass-blur: blur(16px);
        --glass-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 1px rgba(6, 182, 212, 0.3);
        --glass-shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.4);
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--hbr-font-family);
        font-weight: 400;
        background: #070a12;
        width: 660px;
        color: var(--hbr-color-text-body);
        font-size: 12px;
        min-height: 300px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body.sec-embedded {
        background: transparent;
      }

      /* ------------------------------------------------------------------ */
      /* Header bar                                                         */
      /* ------------------------------------------------------------------ */
      .toolbar {
        background: #0f172a;
        display: flex;
        align-items: center;
        padding: 0 16px;
        height: 44px;
        gap: 10px;
        border-bottom: 1px solid #1e293b;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      }
      .toolbar-logo {
        font-size: 16px;
        line-height: 1;
        color: #06b6d4;
      }
      .toolbar-title {
        color: #f8fafc;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        flex: 1;
        font-family: var(--hbr-font-mono);
      }
      .toolbar-close {
        background: transparent;
        border: 1px solid #334155;
        color: #94a3b8;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        padding: 3px 8px;
        border-radius: 2px;
        line-height: 1;
        transition: all 0.15s;
      }
      .toolbar-close:hover {
        background: #ef4444;
        color: #fff;
        border-color: #ef4444;
      }

      /* ------------------------------------------------------------------ */
      /* Error Banner                                                       */
      /* ------------------------------------------------------------------ */
      #error-banner {
        display: none;
        background: rgba(239, 68, 68, 0.1);
        color: #fca5a5;
        padding: 10px 16px;
        font-size: 11px;
        border-bottom: 1px solid rgba(239, 68, 68, 0.3);
        align-items: center;
        gap: 10px;
        font-family: var(--hbr-font-mono);
      }
      #psc-retry-btn {
        background: #06b6d4;
        color: #070a12;
        border: none;
        border-radius: 2px;
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--hbr-font-mono);
        flex-shrink: 0;
        text-transform: uppercase;
      }
      #psc-retry-btn:hover { background: #22d3ee; }

      /* ------------------------------------------------------------------ */
      /* Tabs                                                               */
      /* ------------------------------------------------------------------ */
      .tabs {
        display: flex;
        background: #0f172a;
        border-bottom: 1px solid #1e293b;
        padding: 0 16px;
        gap: 4px;
      }
      .tab-btn {
        background: none;
        border: none;
        padding: 11px 16px;
        font-size: 11px;
        font-weight: 700;
        color: #64748b;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        font-family: var(--hbr-font-mono);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .tab-btn:hover {
        color: #cbd5e1;
      }
      .tab-btn.active {
        color: #06b6d4;
        border-bottom-color: #06b6d4;
        background: rgba(6, 182, 212, 0.05);
      }

      /* ------------------------------------------------------------------ */
      /* Tab Contents                                                       */
      /* ------------------------------------------------------------------ */
      .tab-content {
        display: none;
        flex-direction: column;
      }
      .tab-content.active {
        display: flex;
      }

      /* ------------------------------------------------------------------ */
      /* Skeleton loading                                                   */
      /* ------------------------------------------------------------------ */
      @keyframes psc-skeleton-shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .psc-skeleton {
        padding: 20px;
      }
      .psc-skeleton-line,
      .psc-skeleton-block {
        background: linear-gradient(90deg, #1e293b 25%, #334155 37%, #1e293b 63%);
        background-size: 800px 100%;
        animation: psc-skeleton-shimmer 1.6s ease-in-out infinite;
        border-radius: 2px;
      }
      .psc-skeleton-line { height: 10px; margin-bottom: 12px; }
      .psc-skeleton-line.psc-skeleton-title { height: 14px; width: 40%; margin-bottom: 16px; }
      .psc-skeleton-line.medium { width: 65%; }
      .psc-skeleton-line.long { width: 88%; }
      .psc-skeleton-row { display: flex; gap: 14px; margin-top: 18px; }
      .psc-skeleton-block { flex: 1 1 0; min-width: 0; height: 140px; }
    </style>
  </head>
  <body>

    <!-- Top toolbar -->
    <div class="toolbar">
      <span class="toolbar-logo">⚡</span>
      <span class="toolbar-title">SECURE ACCESS // POLICY ENGINE</span>
      <button id="toolbar-close" class="toolbar-close" title="Close Panel">✕</button>
    </div>

    <!-- Error Banner -->
    <div id="error-banner"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-target="tab-tester">[01] TESTER</button>
      <button class="tab-btn" data-target="tab-rules">[02] RULES & AUDIT</button>
    </div>

    <!-- Tab Contents -->
    <div id="tab-tester" class="tab-content active">
      <div id="tester-root"></div>
    </div>

    <div id="tab-rules" class="tab-content">
      <div id="rules-root"></div>
    </div>

    <!-- Script load order matters -->
    <script src="mock-api.js"></script>
    <script src="matcher.js"></script>
    <script src="popup-sections.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
