<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Access Policy Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />
    <style>
      /* ==================================================================== */
      /* Black & White Monochrome Design Tokens                               */
      /* ==================================================================== */
      :root {
        --hbr-font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --hbr-font-mono: "JetBrains Mono", monospace;

        --hbr-radius-sm: 0px;
        --hbr-radius-md: 0px;
        --hbr-radius-lg: 0px;
        --hbr-radius-pill: 0px;
        --hbr-border-width: 1px;

        --hbr-space-xs: 4px;
        --hbr-space-sm: 8px;
        --hbr-space-md: 12px;
        --hbr-space-lg: 16px;

        --hbr-color-bg-page: #000000;
        --hbr-color-bg-card: #0d0d0d;
        --hbr-color-bg-subtle: #171717;
        --hbr-color-text-body: #d4d4d4;
        --hbr-color-text-heading: #ffffff;
        --hbr-color-text-weak: #888888;
        --hbr-color-border: #262626;

        --hbr-color-accent: #ffffff;
        --hbr-color-accent-hover: #e5e5e5;
        --hbr-color-accent-light: #1a1a1a;
        --hbr-color-header: #0d0d0d;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--hbr-font-family);
        font-weight: 400;
        background: #000000;
        width: 660px;
        color: var(--hbr-color-text-body);
        font-size: 12px;
        min-height: 300px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body.sec-embedded {
        background: transparent;
      }

      /* ------------------------------------------------------------------ */
      /* Header bar                                                         */
      /* ------------------------------------------------------------------ */
      .toolbar {
        background: #0d0d0d;
        display: flex;
        align-items: center;
        padding: 0 16px;
        height: 44px;
        gap: 10px;
        border-bottom: 1px solid #262626;
      }
      .toolbar-logo {
        font-size: 14px;
        line-height: 1;
        color: #ffffff;
        font-weight: bold;
      }
      .toolbar-title {
        color: #ffffff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        flex: 1;
        font-family: var(--hbr-font-mono);
      }
      .toolbar-close {
        background: transparent;
        border: 1px solid #404040;
        color: #a3a3a3;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        padding: 3px 8px;
        border-radius: 0px;
        line-height: 1;
        transition: all 0.15s;
      }
      .toolbar-close:hover {
        background: #ffffff;
        color: #000000;
        border-color: #ffffff;
      }

      /* ------------------------------------------------------------------ */
      /* Error Banner                                                       */
      /* ------------------------------------------------------------------ */
      #error-banner {
        display: none;
        background: #1a1a1a;
        color: #ffffff;
        padding: 10px 16px;
        font-size: 11px;
        border-bottom: 1px solid #404040;
        align-items: center;
        gap: 10px;
        font-family: var(--hbr-font-mono);
      }
      #psc-retry-btn {
        background: #ffffff;
        color: #000000;
        border: none;
        border-radius: 0px;
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--hbr-font-mono);
        flex-shrink: 0;
        text-transform: uppercase;
      }
      #psc-retry-btn:hover { background: #e5e5e5; }

      /* ------------------------------------------------------------------ */
      /* Tabs                                                               */
      /* ------------------------------------------------------------------ */
      .tabs {
        display: flex;
        background: #0d0d0d;
        border-bottom: 1px solid #262626;
        padding: 0 16px;
        gap: 4px;
      }
      .tab-btn {
        background: none;
        border: none;
        padding: 11px 16px;
        font-size: 11px;
        font-weight: 700;
        color: #737373;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        font-family: var(--hbr-font-mono);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .tab-btn:hover {
        color: #d4d4d4;
      }
      .tab-btn.active {
        color: #ffffff;
        border-bottom-color: #ffffff;
        background: #171717;
      }

      /* ------------------------------------------------------------------ */
      /* Tab Contents                                                       */
      /* ------------------------------------------------------------------ */
      .tab-content {
        display: none;
        flex-direction: column;
      }
      .tab-content.active {
        display: flex;
      }

      /* ------------------------------------------------------------------ */
      /* Skeleton loading                                                   */
      /* ------------------------------------------------------------------ */
      @keyframes psc-skeleton-shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .psc-skeleton {
        padding: 20px;
      }
      .psc-skeleton-line,
      .psc-skeleton-block {
        background: linear-gradient(90deg, #171717 25%, #262626 37%, #171717 63%);
        background-size: 800px 100%;
        animation: psc-skeleton-shimmer 1.6s ease-in-out infinite;
        border-radius: 0px;
      }
      .psc-skeleton-line { height: 10px; margin-bottom: 12px; }
      .psc-skeleton-line.psc-skeleton-title { height: 14px; width: 40%; margin-bottom: 16px; }
      .psc-skeleton-line.medium { width: 65%; }
      .psc-skeleton-line.long { width: 88%; }
      .psc-skeleton-row { display: flex; gap: 14px; margin-top: 18px; }
      .psc-skeleton-block { flex: 1 1 0; min-width: 0; height: 140px; }
    </style>
  </head>
  <body>

    <!-- Top toolbar -->
    <div class="toolbar">
      <span class="toolbar-logo">█</span>
      <span class="toolbar-title">SECURE ACCESS // POLICY ENGINE</span>
      <button id="toolbar-close" class="toolbar-close" title="Close Panel">✕</button>
    </div>

    <!-- Error Banner -->
    <div id="error-banner"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-target="tab-tester">[01] TESTER</button>
      <button class="tab-btn" data-target="tab-rules">[02] RULES & AUDIT</button>
    </div>

    <!-- Tab Contents -->
    <div id="tab-tester" class="tab-content active">
      <div id="tester-root"></div>
    </div>

    <div id="tab-rules" class="tab-content">
      <div id="rules-root"></div>
    </div>

    <!-- Script load order matters -->
    <script src="mock-api.js"></script>
    <script src="matcher.js"></script>
    <script src="popup-sections.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
