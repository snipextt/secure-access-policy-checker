<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Access Policy Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />
    <style>
      /* ==================================================================== */
      /* Light Mode Design Tokens (White Background, Dark Text)              */
      /* ==================================================================== */
      :root {
        --hbr-font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --hbr-font-mono: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        --hbr-radius-sm: 2px;
        --hbr-radius-md: 2px;
        --hbr-radius-lg: 2px;
        --hbr-radius-pill: 2px;
        --hbr-border-width: 1px;

        --hbr-space-xs: 4px;
        --hbr-space-sm: 8px;
        --hbr-space-md: 12px;
        --hbr-space-lg: 16px;

        --hbr-color-bg-page: #ffffff;
        --hbr-color-bg-card: #f8fafc;
        --hbr-color-bg-subtle: #f1f5f9;
        --hbr-color-text-body: #1e293b;
        --hbr-color-text-heading: #0f172a;
        --hbr-color-text-weak: #64748b;
        --hbr-color-border: #e2e8f0;

        --hbr-color-accent: #0f172a;
        --hbr-color-accent-hover: #1e293b;
        --hbr-color-accent-light: #e2e8f0;
        --hbr-color-header: #ffffff;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100% !important;
        max-width: 100vw !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow-x: hidden !important;
        box-sizing: border-box !important;
      }

      body {
        font-family: var(--hbr-font-family);
        font-weight: 400;
        background: #ffffff;
        color: var(--hbr-color-text-body);
        font-size: 12px;
        min-height: 300px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body.sec-embedded {
        background: transparent;
      }

      /* ------------------------------------------------------------------ */
      /* Header bar                                                         */
      /* ------------------------------------------------------------------ */
      .toolbar {
        background: #ffffff;
        display: flex;
        align-items: center;
        padding: 0 16px;
        height: 44px;
        gap: 10px;
        border-bottom: 1px solid #e2e8f0;
        width: 100%;
        max-width: 100vw;
        box-sizing: border-box;
      }
      .toolbar-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .toolbar-title {
        color: #0f172a;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        flex: 1;
        font-family: var(--hbr-font-family);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .toolbar-close {
        background: transparent;
        border: 1px solid #cbd5e1;
        color: #64748b;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        padding: 3px 8px;
        border-radius: 2px;
        line-height: 1;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .toolbar-close:hover {
        background: #0f172a;
        color: #ffffff;
        border-color: #0f172a;
      }

      /* ------------------------------------------------------------------ */
      /* Error Banner                                                       */
      /* ------------------------------------------------------------------ */
      #error-banner {
        display: none;
        background: #fef2f2;
        color: #991b1b;
        padding: 10px 16px;
        font-size: 11px;
        border-bottom: 1px solid #fecaca;
        align-items: center;
        gap: 10px;
        font-family: var(--hbr-font-family);
      }
      #psc-retry-btn {
        background: #0f172a;
        color: #ffffff;
        border: none;
        border-radius: 2px;
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        font-family: var(--hbr-font-family);
        flex-shrink: 0;
      }
      #psc-retry-btn:hover { background: #1e293b; }

      /* ------------------------------------------------------------------ */
      /* Tabs                                                               */
      /* ------------------------------------------------------------------ */
      .tabs {
        display: flex;
        background: #ffffff;
        border-bottom: 1px solid #e2e8f0;
        padding: 0 16px;
        gap: 4px;
        width: 100%;
        max-width: 100vw;
        box-sizing: border-box;
      }
      .tab-btn {
        background: none;
        border: none;
        padding: 11px 16px;
        font-size: 12px;
        font-weight: 600;
        color: #64748b;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        font-family: var(--hbr-font-family);
        letter-spacing: 0.02em;
      }
      .tab-btn:hover {
        color: #0f172a;
      }
      .tab-btn.active {
        color: #0f172a;
        border-bottom-color: #0f172a;
        background: #f8fafc;
      }

      /* ------------------------------------------------------------------ */
      /* Tab Contents                                                       */
      /* ------------------------------------------------------------------ */
      .tab-content {
        display: none;
        flex-direction: column;
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden !important;
        box-sizing: border-box;
      }
      .tab-content.active {
        display: flex;
      }

      /* ------------------------------------------------------------------ */
      /* Skeleton loading                                                   */
      /* ------------------------------------------------------------------ */
      @keyframes psc-skeleton-shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .psc-skeleton {
        padding: 20px;
      }
      .psc-skeleton-line,
      .psc-skeleton-block {
        background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 37%, #f1f5f9 63%);
        background-size: 800px 100%;
        animation: psc-skeleton-shimmer 1.6s ease-in-out infinite;
        border-radius: 2px;
      }
      .psc-skeleton-line { height: 10px; margin-bottom: 12px; }
      .psc-skeleton-line.psc-skeleton-title { height: 14px; width: 40%; margin-bottom: 16px; }
      .psc-skeleton-line.medium { width: 65%; }
      .psc-skeleton-line.long { width: 88%; }
      .psc-skeleton-row { display: flex; gap: 14px; margin-top: 18px; }
      .psc-skeleton-block { flex: 1 1 0; min-width: 0; height: 140px; }
    </style>
  </head>
  <body>

    <!-- Top toolbar -->
    <div class="toolbar">
      <span class="toolbar-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 6V11.5C3 16.8 6.8 21.5 12 22.8C17.2 21.5 21 16.8 21 11.5V6L12 2Z" fill="#0F172A" stroke="#0F172A" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M8.5 12L11 14.5L16 9.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="toolbar-title">SECURE ACCESS POLICY ENGINE</span>
      <button id="toolbar-close" class="toolbar-close" title="Close Panel">✕</button>
    </div>

    <!-- Error Banner -->
    <div id="error-banner"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-target="tab-tester">TESTER</button>
      <button class="tab-btn" data-target="tab-rules">RULES & AUDIT</button>
    </div>

    <!-- Tab Contents -->
    <div id="tab-tester" class="tab-content active">
      <div id="tester-root"></div>
    </div>

    <div id="tab-rules" class="tab-content">
      <div id="rules-root"></div>
    </div>

    <!-- Script load order matters -->
    <script src="matcher.js"></script>
    <script src="popup-sections.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
